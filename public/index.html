<script src="/js/api.js"></script>
<script>
const roleHome = {
  CUSTOMER:'/customer.html', ADMIN:'/admin.html', CHAIN_MANAGER:'/chain.html',
  WAREHOUSE_MANAGER:'/warehouse.html', BRANCH_MANAGER:'/branch.html', KITCHEN_STAFF:'/kitchen.html'
};
async function doLogin(e){
  if (e) e.preventDefault();
  const msg = document.getElementById('msg'); msg.innerHTML = '';
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;
  if (!phone) return msg.innerHTML = '<div class="msg err">Vui lòng nhập số điện thoại</div>';
  if (!password) return msg.innerHTML = '<div class="msg err">Vui lòng nhập mật khẩu</div>';
  const btn = document.getElementById('btnLogin');
  btn.disabled = true; const oldText = btn.textContent; btn.textContent = 'Đang đăng nhập...';
  try {
    const data = await api('/auth/login', { method:'POST', body:{ phone, password } });
    setToken(data.token); setUser(data.user);
    msg.innerHTML = '<div class="msg ok">✓ Đăng nhập thành công, đang chuyển hướng...</div>';
    const r = data.user.role_code || data.user.role;
    setTimeout(() => location.href = roleHome[r] || '/customer.html', 350);
  } catch (e) {
    msg.innerHTML = '<div class="msg err">' + escapeHtml(e.message) + '</div>';
  } finally {
    btn.disabled = false; btn.textContent = oldText;
  }
}
document.getElementById('loginForm').addEventListener('submit', doLogin);
</script>
